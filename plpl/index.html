<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Para mi persona favorita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <main class="wrapper">
        <section class="hero-section">
            <div class="glass-card">
                <div class="card-image" style="background-image: url('foto.jpg');"></div>
                <div class="card-content">
                    <h1>Mi amor...</h1>
                    <p class="editable-text">
                        Muak mi bella , no sabes lo mucho que significas para mi 
                        Cada momento contigo es único y quería hacer este pequeño detalle para recordarte 
                        lo mucho que significas para mí, solo quiero hacerte muy feliz mi hermosisima mujer 
                    </p>
                </div>
            </div>
        </section>

        <section class="reveal-section">
            <div class="heart-container">
                <svg viewBox="0 0 32 29.6" class="animated-heart" id="main-heart">
                    <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                    c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
                </svg>
                <h2 class="reveal-text">Te amo mucho mi vida</h2>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
